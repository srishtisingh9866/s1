<!DOCTYPE html>
<html>
<head>
<title>Create Section</title>

<style>
body {
    font-family: Arial;
    padding: 30px;
}

input, select {
    padding: 10px;
    margin: 10px 0;
    width: 250px;
}

button {
    padding: 10px;
    background: green;
    color: white;
    border: none;
}
</style>
</head>

<body>

<h2>Create Section</h2>

<form method="POST">
    {% csrf_token %}

    <input type="text" name="name" placeholder="Section Name (e.g. A)" required>

    <br>

    <select name="teacher" required>
        <option value="">Select Teacher</option>
        {% for teacher in teachers %}
            <option value="{{ teacher.id }}">
                {{ teacher.user.username }}
            </option>
        {% endfor %}
    </select>

    <br>

    <button type="submit">Create Section</button>
</form>

<hr>

<h2>All Sections</h2>

<ul>
    {% for section in sections %}
        <li>
            {{ section.name }} - {{ section.teacher.user.username }}
        </li>
    {% endfor %}
</ul>

</body>
</html>
