<!DOCTYPE html>
<html>
<head>
<title>Create Section</title>

<style>
body {
    font-family: Arial;
    padding: 30px;
}

input, select {
    padding: 10px;
    margin: 10px 0;
    width: 250px;
}

button {
    padding: 10px;
    background: green;
    color: white;
    border: none;
}
</style>
</head>

<body>

<h2>Create Section</h2>

<form method="POST">
    {% csrf_token %}

    <input type="text" name="name" placeholder="Section Name (e.g. A)" required>

    <br>

    <select name="teacher" required>
        <option value="" disabled selected>Select Teacher</option>

        {% for teacher in teachers %}
            <option value="{{ teacher.user.id }}">
                {{ teacher.user.username }}
            </option>
        {% endfor %}
    </select>

    <br>

    <button type="submit">Create Section</button>
</form>

<hr>

<h2>All Sections</h2>
<h2>All Sections</h2>

<table border="1" cellpadding="10">
    <tr>
        <th>Name</th>
        <th>Teacher</th>
        <th>Actions</th>
    </tr>

    {% for section in sections %}
    <tr>
        <td>{{ section.name }}</td>
        <td>{{ section.teacher.user.username }}</td>

        <td>
            <a href="{% url 'edit_section' section.id %}">Edit</a>
            |
            <a href="{% url 'delete_section' section.id %}">Delete</a>
        </td>
    </tr>
    {% endfor %}
</table>
</body>
</html>
