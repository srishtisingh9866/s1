<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student List</title>
    <style>
       
        
    </style>
</head>
<body>
    <h2>Students</h2>

<form method="GET">
    <input type="text" name="q" placeholder="Search student...">
    <button type="submit">Search</button>
</form>

<ul>
    {% for s in students %}
        <li>
            {{ s.user.username }} - {{ s.display_id }} - Section: {{ s.section.name }}
        </li>
    {% endfor %}
</ul>
</body>
</html>
