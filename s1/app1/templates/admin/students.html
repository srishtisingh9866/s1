<h2>Students</h2>

<form method="GET">
    <input type="text" name="q" placeholder="Search student...">
    <button type="submit">Search</button>
</form>

<ul>
    {% for s in students %}
        <li>
            {{ s.user.username }} - {{ s.display_id }} - Section: {{ s.section.name }}
        </li>
    {% endfor %}
</ul>
