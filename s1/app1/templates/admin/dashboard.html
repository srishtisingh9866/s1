<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    display: flex;
}

/* SIDEBAR */
.sidebar {
    width: 220px;
    height: 100vh;
    background: #192225;
    color: white;
    padding: 20px;
}

.sidebar a {
    display: block;
    margin: 15px 0;
    color: white;
    text-decoration: none;
}

/* MAIN */
.main {
    flex: 1;
    padding: 30px;
    background: #4847587f;
}

.card {
    background: white;
    padding: 20px;
    border-radius: 10px;
    margin-bottom: 20px;
}
</style>
</head>

<body>

<div class="sidebar">
    <h2>Admin Panel</h2>

    <a href="{% url 'view_teachers' %}">Teachers</a>
    <a href="{% url 'view_students' %}">Students</a>
    <a href="{% url 'create_section' %}">Sections</a>

    <form method="POST" action="{% url 'logout' %}">
        {% csrf_token %}
        <button type="submit">Logout</button>
    </form>
</div>

<div class="main">
    <h1>Welcome Admin</h1>

    <div class="card">Manage Teachers</div>
    <div class="card">Manage Students</div>
    <div class="card">Manage Sections</div>
</div>

</body>
</html>
