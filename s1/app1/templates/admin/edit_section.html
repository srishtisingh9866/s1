<h2>Edit Section</h2>

<form method="POST">
    {% csrf_token %}

    <input type="text" name="name" value="{{ section.name }}">

    <select name="teacher">
        {% for t in teachers %}
            <option value="{{ t.user.id }}"
                {% if t == section.teacher %}selected{% endif %}>
                {{ t.user.username }}
            </option>
        {% endfor %}
    </select>

    <button type="submit">Update</button>
</form>
